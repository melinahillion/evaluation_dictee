name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qualite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer uv
        uses: astral-sh/setup-uv@v3

      - name: Installer Python et dépendances
        run: |
          uv python install 3.11
          uv sync

      - name: Lint (ruff)
        run: uv run ruff check src tests scripts

      - name: Formatage (ruff)
        run: uv run ruff format --check src tests scripts

      - name: Typage (mypy)
        run: uv run mypy src
        continue-on-error: true   # non bloquant au démarrage du projet

      - name: Tests (pytest)
        run: uv run pytest
