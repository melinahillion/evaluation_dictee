# Expérience : dictée 2015, gemma4-26b-moe servi sur llm.lab (SSP Cloud).
# Modèle multimodal accessible directement via API : aucun GPU à privatiser.
# Données lues directement sur S3.

name: dictee_gemma4_zeroshot
seed: 42

model:
  # Nom exact tel qu'affiché sur https://llm.lab.sspcloud.fr
  name: gemma4-26b-moe
  kind: vlm
  temperature: 0.0
  max_tokens: 4096
  request_logprobs: true

data:
  corpus: dictee
  # Imagettes et corrections directement sur S3 (s3fs lit les identifiants
  # depuis l'environnement Onyxia / le fichier .env).
  images_path: s3://projet-production-ecrits-depp/dictee_2015/
  labels_path: s3://projet-production-ecrits-depp/resultat_dictee_2015.csv
  # Grille de codage versionnée dans le dépôt (texte de référence + fautes connues).
  grid_path: configs/grille_dictee_2015.json
  limit: 100           # commencer petit ; mettre null pour tout le corpus

grid:
  # "simplifiee" : le modèle ET les experts codent en 1/9/0 (3/4/5 regroupés en 9).
  # "complete"   : codage en 1/3/4/5/9/0 (distingue lexical/grammatical/mixte).
  # Le prompt du modèle et le prétraitement des codes experts s'adaptent
  # automatiquement à ce choix : les deux côtés codent dans le même jeu de modalités.
  scheme: simplifiee

prompt:
  method: C           # end-to-end (image -> code)
  n_few_shot: 0
  enforce_faithful: true
  read_final_state: true
