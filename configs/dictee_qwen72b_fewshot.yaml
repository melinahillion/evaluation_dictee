# Expérience : dictée 2015, Qwen2.5-VL-72B, few-shot (5 exemples), grille simplifiée.
# Variante haute capacité, à comparer au 7B pour arbitrer le coût GPU.

name: dictee_qwen72b_fewshot5
seed: 42

model:
  name: Qwen/Qwen2.5-VL-72B-Instruct
  kind: vlm
  temperature: 0.0
  max_tokens: 4096
  request_logprobs: true

data:
  corpus: dictee
  images_path: data/raw/dictee_2015
  labels_path: data/raw/resultat_dictee_2015.csv
  grid_path: configs/grille_dictee_2015.json
  limit: 200

grid:
  scheme: simplifiee

prompt:
  method: C
  n_few_shot: 5
  enforce_faithful: true
  read_final_state: true
